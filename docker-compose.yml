services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www
      - vendor-data:/var/www/vendor
    depends_on:
      postgres:
        condition: service_started
    networks:
      - app-network
    tty: true

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    working_dir: /var/www
    volumes:
      - .:/var/www
      - node-modules-data:/var/www/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sia_rgp_tech_task
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:

volumes:
  postgres-data:
  vendor-data:
  node-modules-data:
