; Development PHP configuration for instant file reload
opcache.enable=0
opcache.enable_cli=0

; If you prefer OPcache on for speed but still want instant reloads, use:
; opcache.enable=1
; opcache.revalidate_freq=0
; opcache.validate_timestamps=1

; Increase realpath cache TTL for bind-mounted volumes
realpath_cache_size=4096k
realpath_cache_ttl=0

; Show all errors in development
display_errors=On
error_reporting=E_ALL
